<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Lab Kimia</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #eef2f3; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        #jawapan { 
            margin-top: 20px; padding: 15px; background: #d4edda; 
            border: 1px solid #c3e6cb; border-radius: 5px; 
            display: none; /* Sembunyi asal */
        }
        .persamaan { font-family: monospace; font-size: 18px; color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔬 Makmal Kimia</h2>
    
    <label>Pilih Logam:</label>
    <select id="L">
        <option value="Mg">Magnesium (Mg)</option>
        <option value="Cu">Kuprum (Cu)</option>
    </select>

    <label>Pilih Larutan:</label>
    <select id="S">
        <option value="CuSO4">Kuprum(II) Sulfat (Biru)</option>
        <option value="MgSO4">Magnesium Sulfat (Bening)</option>
    </select>

    <button type="button" onclick="proses()">UJI TINDAK BALAS</button>

    <div id="jawapan">
        <strong>Hasil:</strong><br>
        <div id="teks_eq" class="persamaan"></div>
        <hr>
        <div id="teks_ion"></div>
        <div id="teks_warna" style="margin-top:10px; font-style: italic;"></div>
    </div>
</div>

<script>
    function proses() {
        // 1. Ambil data
        var logam = document.getElementById("L").value;
        var larutan = document.getElementById("S").value;
        var box = document.getElementById("jawapan");

        // 2. Logik Peneutralan/Penyesaran
        var eq = ""; 
        var ion = ""; 
        var warna = "";

        if (logam === "Mg" && larutan === "CuSO4") {
            eq = "Mg + CuSO₄ → MgSO₄ + Cu";
            ion = "Kation: Mg²⁺ | Anion: SO₄²⁻";
            warna = "Warna biru larutan menjadi pudar. Mendakan perang terbentuk.";
        } else if (logam === "Cu" && larutan === "MgSO4") {
            eq = "Tiada Tindak Balas";
            ion = "-";
            warna = "Tiada perubahan warna kerana Cu kurang reaktif.";
        } else {
            eq = "Tiada Perubahan Ketara";
            ion = "-";
            warna = "Logam dan larutan dari jenis yang sama.";
        }

        // 3. Paparkan jawapan (Bahagian ini yang kritikal)
        document.getElementById("teks_eq").innerText = eq;
        document.getElementById("teks_ion").innerHTML = "<b>Analisis Ion:</b> " + ion;
        document.getElementById("teks_warna").innerText = "Pemerhatian: " + warna;
        
        // Arahan paksa untuk muncul
        box.style.display = "block";
        
        // Tambah alert kecil untuk pastikan kod berjalan
        console.log("Kod Berhasil!");
    }
</script>

</body>
</html>
