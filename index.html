<!DOCTYPE html>
<html>
<body>
    <h3>Ujian Penyesaran</h3>
    
    Logam: 
    <select id="m">
        <option value="10">Magnesium (Kuat)</option>
        <option value="5">Kuprum (Lemah)</option>
    </select><br>

    Larutan: 
    <select id="s">
        <option value="5">Kuprum(II) Sulfat</option>
        <option value="10">Magnesium Sulfat</option>
    </select><br>

    <button onclick="run()">UJI SEKARANG</button>

    <div id="out" style="margin-top:20px; padding:10px; border:1px solid #ccc; display:none;"></div>

    <script>
        function run() {
            var metal = parseInt(document.getElementById('m').value);
            var salt = parseInt(document.getElementById('s').value);
            var out = document.getElementById('out');

            out.style.display = "block";

            if (metal > salt) {
                out.innerHTML = "<b>BERJAYA!</b><br>Persamaan: Mg + Cu²⁺ → Mg²⁺ + Cu<br>Warna: Biru jadi Pudar.";
                out.style.color = "green";
            } else {
                out.innerHTML = "<b>TIADA TINDAK BALAS</b><br>Logam tidak cukup kuat untuk menghalau kation.";
                out.style.color = "red";
            }
        }
    </script>
</body>
</html>
